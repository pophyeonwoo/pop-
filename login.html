<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP! 현우</title>
    <link rel="stylesheet" href="login.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 350px;
        }
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }
        .google-btn {
            background-color: white;
            color: #444;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            
            /* 부드러운 애니메이션 및 가운데 정렬 */
            transition: all 0.3s ease-in-out;
            margin: 0 auto;
        }
        
        /* 마우스를 올렸을 때(Hover) 너비 축소 및 색반전 효과 */
        .google-btn:hover {
            width: 85%;
            background-color: #222222;
            color: #ffffff;
            border-color: #222222;
        }

        .logout-btn {
            background-color: #ff4d4f;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        .logout-btn:hover {
            background-color: #ff7875;
        }
        #user-info {
            display: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 로그인 전 화면 -->
        <div id="login-section">
            <h2>WELCOME TO POP! 현우</h2>
            <p>POP! 현우를 이용하려면 구글 계정으로 로그인해 주세요!</p>
            <button id="google-login-btn" class="google-btn">
                <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.46-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                구글로 로그인
            </button>
        </div>

        <!-- 로그인 후 화면 -->
        <div id="user-info">
            <h2 id="welcome-msg"></h2>
            <p id="user-email"></p>
            <button id="logout-btn" class="logout-btn">로그아웃</button>
        </div>
    </div>

    <!-- Firebase SDK 및 로그인 로직 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 파이어베이스 설정 및 Analytics 추가
        const firebaseConfig = {
            apiKey: "AIzaSyAkc_5meIA6xKzLyfLvR1Q3LI4yaCOENXw",
            authDomain: "pophyeonwoo.firebaseapp.com",
            projectId: "pophyeonwoo",
            storageBucket: "pophyeonwoo.firebasestorage.app",
            messagingSenderId: "555016133326",
            appId: "1:555016133326:web:daad017eef06b063388e9f",
            measurementId: "G-73S9FCZQ2R"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        const loginBtn = document.getElementById('google-login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const loginSection = document.getElementById('login-section');
        const userInfo = document.getElementById('user-info');
        const welcomeMsg = document.getElementById('welcome-msg');
        const userEmail = document.getElementById('user-email');

        // 구글 로그인 실행
        loginBtn.addEventListener('click', () => {
            signInWithPopup(auth, provider)
                .catch((error) => {
                    console.error("로그인 실패:", error);
                });
        });

        // 로그아웃 실행
        logoutBtn.addEventListener('click', () => {
            signOut(auth).catch((error) => {
                console.error("로그아웃 실패:", error);
            });
        });

        // 로그인 상태에 따른 화면 전환 감지
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.style.display = 'none';
                userInfo.style.display = 'block';
                welcomeMsg.innerText = `${user.displayName}님 환영합니다!`;
                userEmail.innerText = user.email;
            } else {
                loginSection.style.display = 'block';
                userInfo.style.display = 'none';
            }
        });
    </script>
</body>
</html>
