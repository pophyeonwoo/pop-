<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 구글/네이버 검색 노출을 완전히 차단하는 태그 -->
    <meta name="robots" content="noindex, nofollow"> 
    <title>팝 현우 POP HYEONWOO</title>
    <style>
        /* 화면 중앙 정렬 및 배경 설정 */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: 'Arial', sans-serif;
            user-select: none; /* 더블클릭 시 텍스트가 선택되는 것을 방지 */
            position: relative;
        }

        /* 우측 상단 프로필 영역 스타일 */
        .user-profile-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 8px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .user-profile-container img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-profile-container span {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .mini-logout-btn {
            background-color: #ff4d4f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .mini-logout-btn:hover {
            background-color: #ff7875;
        }

        /* 랭킹 보드 스타일 (좌측 상단) */
        .ranking-board {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 200px;
            z-index: 10;
        }

        .ranking-board h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #333;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 6px;
        }

        #rankList {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
            color: #555;
            max-height: 150px;
            overflow-y: auto;
        }

        #rankList li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px dashed #eee;
        }

        /* 점수판 스타일 */
        #score {
            font-size: 100px;
            margin: 20px 0;
            color: #333;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.2);
        }

        /* 이미지 스타일 */
        #popImage {
            width: 350px;
            height: auto;
            cursor: pointer;
            -webkit-user-drag: none; /* 이미지 드래그 방지 */
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.05s;
        }
        
        #popImage:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <!-- 좌측 상단 실시간 랭킹 보드 -->
    <div class="ranking-board">
        <h3>🏆 실시간 랭킹</h3>
        <ul id="rankList">
            <li>불러오는 중...</li>
        </ul>
    </div>

    <!-- 우측 상단 구글 프로필 & 로그아웃 영역 -->
    <div id="userProfile" class="user-profile-container" style="display: none;">
        <img id="userPhoto" src="" alt="프로필 사진">
        <span id="userName">사용자</span>
        <button id="miniLogoutBtn" class="mini-logout-btn">로그아웃</button>
    </div>

    <!-- 점수판 -->
    <h1 id="score">0</h1>
    
    <!-- 기본 상태 이미지 -->
    <img id="popImage" src="닫음.jpg" alt="Pop Face">

    <!-- Firebase SDK 및 기능 스크립트 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, update, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 본인의 파이어베이스 설정 정보 입력
        const firebaseConfig = {
            apiKey: "AIzaSyAkc_5meIA6xKzLyfLvR1Q3LI4yaCOENXw",
            authDomain: "pophyeonwoo.firebaseapp.com",
            projectId: "pophyeonwoo",
            storageBucket: "pophyeonwoo.firebasestorage.app",
            messagingSenderId: "555016133326",
            appId: "1:555016133326:web:daad017eef06b063388e9f",
            measurementId: "G-73S9FCZQ2R"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const userProfileDiv = document.getElementById('userProfile');
        const userPhoto = document.getElementById('userPhoto');
        const userName = document.getElementById('userName');
        const miniLogoutBtn = document.getElementById('miniLogoutBtn');
        const scoreDisplay = document.getElementById('score');
        const rankList = document.getElementById('rankList');

        let score = 0;
        let currentUser = null;
        let saveTimeout = null;

        // 로그인 상태 체크 및 데이터베이스에서 기존 점수 불러오기
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                userPhoto.src = user.photoURL || "https://via.placeholder.com/36";
                userName.innerText = user.displayName ? `${user.displayName}님` : "사용자";
                userProfileDiv.style.display = 'flex';

                // 파이어베이스 Firestore에서 해당 유저의 점수 가져오기
                const userDocRef = doc(db, "users", user.uid);
                const userDoc = await getDoc(userDocRef);

                if (userDoc.exists()) {
                    score = userDoc.data().score || 0;
                    scoreDisplay.innerText = score;
                } else {
                    // 처음 로그인한 유저라면 0점으로 문서 생성
                    await setDoc(userDocRef, {
                        name: user.displayName || "익명",
                        score: 0,
                        photo: user.photoURL || ""
                    });
                    score = 0;
                    scoreDisplay.innerText = 0;
                }

                // 랭킹 리스트 실시간 불러오기 시작
                loadRanking();

            } else {
                alert("로그인이 필요한 서비스입니다!");
                window.location.href = "index.html"; 
            }
        });

        // 점수를 데이터베이스에 저장하는 함수 (디바운싱 적용으로 과도한 요청 방지)
        function saveScoreToDB() {
            if (!currentUser) return;
            const userDocRef = doc(db, "users", currentUser.uid);
            setDoc(userDocRef, {
                name: currentUser.displayName || "익명",
                score: score,
                photo: currentUser.photoURL || ""
            }, { merge: true });
        }

        // 실시간 랭킹 리스트 가져오기 (점수 높은 순으로 상위 5명)
        function loadRanking() {
            const q = query(collection(db, "users"), orderBy("score", "desc"), limit(5));
            onSnapshot(q, (snapshot) => {
                rankList.innerHTML = "";
                let rank = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${rank}. ${data.name}</span> <strong>${data.score}점</strong>`;
                    rankList.appendChild(li);
                    rank++;
                });
            });
        }

        // 미니 로그아웃 버튼 기능
        miniLogoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html"; 
            }).catch((error) => {
                console.error("로그아웃 실패:", error);
            });
        });

        // ==========================================
        // 🔑 비밀번호 설정 구역
        // ==========================================
        const SECRET_PASSWORD = "김도현"; 

        const userInput = prompt("업데이트 개발을 위해 팝현우를 잠시 폐쇄합니다...");

        if (userInput !== SECRET_PASSWORD) {
            alert("비밀번호가 틀렸습니다! 접근 권한이 없습니다.");
            document.body.innerHTML = `
                <div style="text-align: center; margin-top: 20vh; font-family: sans-serif;">
                    <h1 style="font-size: 80px;">🔒</h1>
                    <h2 style="color: #ff5e5e; font-size: 24px;">접근이 차단되었습니다.</h2>
                    <p style="color: #666;">올바른 비밀번호를 입력해야 접속할 수 있습니다.</p>
                </div>
            `;
            throw new Error("Access Denied: Incorrect Password");
        }
        // ==========================================

        const popImage = document.getElementById('popImage');
        const imgClosed = '닫음.jpg';
        const imgOpen = '열.png';
        const popSound = new Audio('pop.mp3'); 

        // 3. 입 벌리기 + 점수 올리기 + 소리 재생 + DB 저장 연동
        function openMouth(event) {
            if(event) event.preventDefault(); 

            popImage.src = imgOpen; 
            score++; 
            scoreDisplay.innerText = score; 

            popSound.currentTime = 0; 
            popSound.play(); 

            // 클릭할 때마다 실시간으로 점수 저장 (서버 부하 방지를 위해 딜레이나 즉시 반영 조절 가능)
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveScoreToDB();
            }, 300); // 마지막 클릭 후 0.3초 뒤에 서버에 최종 점수 반영
        }

        // 4. 입 다물기
        function closeMouth(event) {
            if(event) event.preventDefault();
            popImage.src = imgClosed; 
        }

        // 5. 마우스 및 터치 이벤트 바인딩
        popImage.addEventListener('mousedown', openMouth); 
        popImage.addEventListener('mouseup', closeMouth); 
        popImage.addEventListener('mouseleave', closeMouth); 

        popImage.addEventListener('touchstart', openMouth, {passive: false}); 
        popImage.addEventListener('touchend', closeMouth);
        popImage.addEventListener('touchcancel', closeMouth);
    </script>

</body>
</html>
