<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> 
    <title>팝 현우 POP HYEONWOO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: 'Arial', sans-serif;
            user-select: none;
            position: relative;
            overflow: hidden;
        }

        /* 우측 상단 닉네임, 설정 버튼, 로그아웃 버튼 (PC 기준) */
        .user-controls {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 6px 10px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .user-controls span {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-left: 2px;
        }

        .control-btn {
            background-color: #4f46e5;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .control-btn:hover {
            background-color: #4338ca;
        }

        .control-btn.logout {
            background-color: #ff4d4f;
        }

        .control-btn.logout:hover {
            background-color: #ff7875;
        }

        /* 랭킹 보드 스타일 (PC 기준) */
        .ranking-board {
            position: absolute;
            top: 15px;
            left: 15px;
            background: white;
            padding: 10px 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 160px;
            z-index: 10;
        }

        .ranking-board h3 {
            margin: 0 0 8px 0;
            font-size: 14px;
            color: #333;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 5px;
        }

        #rankList {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 12px;
            color: #555;
            max-height: 120px;
            overflow-y: auto;
        }

        #rankList li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            padding-bottom: 3px;
            border-bottom: 1px dashed #eee;
        }

        #score {
            font-size: 80px;
            margin: 15px 0;
            color: #333;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.2);
        }

        #popImage {
            width: 280px;
            height: auto;
            cursor: pointer;
            -webkit-user-drag: none;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.05s;
        }
        
        #popImage:active {
            transform: scale(0.95);
        }

        /* 📱 모바일 화면 (가로폭 768px 이하) 전용: 훨씬 작게 조정 */
        @media (max-width: 768px) {
            .ranking-board {
                width: 95px;            /* 랭킹창 폭을 아주 좁게 축소 */
                padding: 5px 6px;
                top: 8px;
                left: 8px;
                border-radius: 8px;
            }
            .ranking-board h3 {
                font-size: 9px;
                margin-bottom: 3px;
                padding-bottom: 2px;
            }
            #rankList {
                font-size: 8px;         /* 글씨 크기를 대폭 축소 */
                max-height: 70px;
            }
            #rankList li {
                margin-bottom: 2px;
                padding-bottom: 1px;
            }

            .user-controls {
                top: 8px;
                right: 8px;
                padding: 3px 6px;
                gap: 3px;
                border-radius: 20px;
            }
            .user-controls span {
                font-size: 9px;         /* 닉네임 글씨 작게 */
            }
            .control-btn {
                padding: 2px 5px;
                font-size: 8px;         /* 설정/로그아웃 버튼 초소형화 */
                border-radius: 8px;
            }

            #score {
                font-size: 50px;
                margin: 5px 0;
            }

            #popImage {
                width: 200px;           /* 캐릭터 이미지도 모바일에 알맞게 축소 */
            }
        }

        /* 팝업창 스타일 */
        #popupOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .popup-content {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 85%;
            max-height: 85%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .popup-content img {
            max-width: 260px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .popup-close-btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .popup-close-btn:hover {
            background-color: #555;
        }
    </style>
</head>
<body>

    <!-- 팝업창 -->
    <div id="popupOverlay">
        <div class="popup-content">
            <img src="공지.jpg" alt="공지 이미지">
            <button id="popupCloseBtn" class="popup-close-btn">닫기</button>
        </div>
    </div>

    <div class="ranking-board">
        <h3>🏆 랭킹</h3>
        <ul id="rankList">
            <li>로딩중</li>
        </ul>
    </div>

    <div id="userControls" class="user-controls" style="display: none;">
        <span id="userName">사용자님</span>
        <button id="configBtn" class="control-btn">⚙️</button>
        <button id="logoutBtn" class="control-btn logout">로그아웃</button>
    </div>

    <h1 id="score">0</h1>
    <img id="popImage" src="닫음.jpg" alt="Pop Face">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkc_5meIA6xKzLyfLvR1Q3LI4yaCOENXw",
            authDomain: "pophyeonwoo.firebaseapp.com",
            projectId: "pophyeonwoo",
            storageBucket: "pophyeonwoo.firebasestorage.app",
            messagingSenderId: "555016133326",
            appId: "1:555016133326:web:daad017eef06b063388e9f",
            measurementId: "G-73S9FCZQ2R"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const SECRET_PASSWORD = "김도현"; 
        const userInput = prompt("업데이트 개발을 위해 팝현우를 잠시 폐쇄합니다...");

        if (userInput !== SECRET_PASSWORD) {
            alert("비밀번호가 틀렸습니다! 접근 권한이 없습니다.");
            document.body.innerHTML = `
                <div style="text-align: center; margin-top: 20vh; font-family: sans-serif;">
                    <h1 style="font-size: 80px;">🔒</h1>
                    <h2 style="color: #ff5e5e; font-size: 24px;">접근이 차단되었습니다.</h2>
                    <p style="color: #666;">올바른 비밀번호를 입력해야 접속할 수 있습니다.</p>
                </div>
            `;
            throw new Error("Access Denied: Incorrect Password");
        }

        const popupOverlay = document.getElementById('popupOverlay');
        const popupCloseBtn = document.getElementById('popupCloseBtn');

        popupCloseBtn.addEventListener('click', () => {
            popupOverlay.style.display = 'none';
        });

        popupOverlay.addEventListener('click', (e) => {
            if (e.target === popupOverlay) {
                popupOverlay.style.display = 'none';
            }
        });

        const userControls = document.getElementById('userControls');
        const userNameSpan = document.getElementById('userName');
        const configBtn = document.getElementById('configBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const scoreDisplay = document.getElementById('score');
        const rankList = document.getElementById('rankList');
        const popImage = document.getElementById('popImage');

        let score = 0;
        let currentNickname = "익명";
        let currentUser = null;
        let saveTimeout = null;

        const imgClosed = '닫음.jpg';
        const imgOpen = '열.png';
        const popSound = new Audio('pop.mp3'); 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;

                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const userDoc = await getDoc(userDocRef);

                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        score = data.score || 0;
                        currentNickname = data.name || user.displayName || "익명";
                        scoreDisplay.innerText = score;
                    } else {
                        currentNickname = user.displayName || "익명";
                        await setDoc(userDocRef, {
                            name: currentNickname,
                            score: 0,
                            photo: user.photoURL || ""
                        });
                        score = 0;
                        scoreDisplay.innerText = 0;
                    }
                    userNameSpan.innerText = `${currentNickname}님`;
                    userControls.style.display = 'flex';
                } catch (e) {
                    console.error("데이터베이스 불러오기 오류:", e);
                }

                loadRanking();
            } else {
                alert("로그인이 필요한 서비스입니다!");
                window.location.href = "index.html"; 
            }
        });

        configBtn.addEventListener('click', async () => {
            const newNickname = prompt("변경할 닉네임을 입력해주세요 (최대 10글자):", currentNickname);
            if (newNickname !== null) {
                const trimmed = newNickname.trim();
                if (trimmed === "") {
                    alert("닉네임은 공백일 수 없습니다.");
                    return;
                }
                if (trimmed.length > 10) {
                    alert("닉네임은 10글자 이하로 입력해주세요.");
                    return;
                }

                currentNickname = trimmed;
                userNameSpan.innerText = `${currentNickname}님`;

                if (currentUser) {
                    const userDocRef = doc(db, "users", currentUser.uid);
                    await setDoc(userDocRef, {
                        name: currentNickname,
                        score: score,
                        photo: currentUser.photoURL || ""
                    }, { merge: true });
                }
                alert(`닉네임이 '${currentNickname}'(으)로 변경되었습니다!`);
            }
        });

        function saveScoreToDB() {
            if (!currentUser) return;
            const userDocRef = doc(db, "users", currentUser.uid);
            setDoc(userDocRef, {
                name: currentNickname,
                score: score,
                photo: currentUser.photoURL || ""
            }, { merge: true }).catch(err => {
                console.error("점수 저장 실패:", err);
            });
        }

        function loadRanking() {
            const q = query(collection(db, "users"), orderBy("score", "desc"), limit(5));
            onSnapshot(q, (snapshot) => {
                rankList.innerHTML = "";
                let rank = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${rank}. ${data.name}</span> <strong>${data.score}</strong>`;
                    rankList.appendChild(li);
                    rank++;
                });
            }, (error) => {
                console.error("랭킹 불러오기 실패:", error);
                rankList.innerHTML = "<li>로드 실패</li>";
            });
        }

        logoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html"; 
            });
        });

        function openMouth(event) {
            if(event) event.preventDefault(); 
            popImage.src = imgOpen; 
            score++; 
            scoreDisplay.innerText = score; 

            popSound.currentTime = 0; 
            popSound.play().catch(e => console.log("오디오 재생 실패:", e)); 

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveScoreToDB();
            }, 300);
        }

        function closeMouth(event) {
            if(event) event.preventDefault();
            popImage.src = imgClosed; 
        }

        popImage.addEventListener('mousedown', openMouth); 
        popImage.addEventListener('mouseup', closeMouth); 
        popImage.addEventListener('mouseleave', closeMouth); 

        popImage.addEventListener('touchstart', openMouth, {passive: false}); 
        popImage.addEventListener('touchend', closeMouth);
        popImage.addEventListener('touchcancel', closeMouth);
    </script>
</body>
</html>
