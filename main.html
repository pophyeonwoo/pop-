<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow"> 
    <title>팝 현우 POP HYEONWOO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            font-family: 'Arial', sans-serif;
            user-select: none;
            position: relative;
        }

        /* 우측 상단 프로필 영역 (클릭 가능하도록 커서 추가) */
        .user-profile-container {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 8px 15px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 10;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .user-profile-container:hover {
            background-color: #f0f0f0;
        }

        .user-profile-container img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-profile-container span {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }

        .mini-logout-btn {
            background-color: #ff4d4f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .mini-logout-btn:hover {
            background-color: #ff7875;
        }

        .ranking-board {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 200px;
            z-index: 10;
        }

        .ranking-board h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #333;
            text-align: center;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 6px;
        }

        #rankList {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 13px;
            color: #555;
            max-height: 150px;
            overflow-y: auto;
        }

        #rankList li {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            padding-bottom: 4px;
            border-bottom: 1px dashed #eee;
        }

        #score {
            font-size: 100px;
            margin: 20px 0;
            color: #333;
            text-shadow: 3px 3px 5px rgba(0,0,0,0.2);
        }

        #popImage {
            width: 350px;
            height: auto;
            cursor: pointer;
            -webkit-user-drag: none;
            border-radius: 20px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.15);
            transition: transform 0.05s;
        }
        
        #popImage:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="ranking-board">
        <h3>🏆 실시간 랭킹</h3>
        <ul id="rankList">
            <li>불러오는 중...</li>
        </ul>
    </div>

    <!-- 우측 상단 프로필 (클릭하여 닉네임 변경 가능) -->
    <div id="userProfile" class="user-profile-container" style="display: none;" title="클릭해서 닉네임을 변경하세요!">
        <img id="userPhoto" src="" alt="프로필 사진">
        <span id="userName">사용자</span>
        <button id="miniLogoutBtn" class="mini-logout-btn">로그아웃</button>
    </div>

    <h1 id="score">0</h1>
    <img id="popImage" src="닫음.jpg" alt="Pop Face">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAkc_5meIA6xKzLyfLvR1Q3LI4yaCOENXw",
            authDomain: "pophyeonwoo.firebaseapp.com",
            projectId: "pophyeonwoo",
            storageBucket: "pophyeonwoo.firebasestorage.app",
            messagingSenderId: "555016133326",
            appId: "1:555016133326:web:daad017eef06b063388e9f",
            measurementId: "G-73S9FCZQ2R"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🔑 비밀번호 체크
        const SECRET_PASSWORD = "김도현"; 
        const userInput = prompt("업데이트 개발을 위해 팝현우를 잠시 폐쇄합니다...");

        if (userInput !== SECRET_PASSWORD) {
            alert("비밀번호가 틀렸습니다! 접근 권한이 없습니다.");
            document.body.innerHTML = `
                <div style="text-align: center; margin-top: 20vh; font-family: sans-serif;">
                    <h1 style="font-size: 80px;">🔒</h1>
                    <h2 style="color: #ff5e5e; font-size: 24px;">접근이 차단되었습니다.</h2>
                    <p style="color: #666;">올바른 비밀번호를 입력해야 접속할 수 있습니다.</p>
                </div>
            `;
            throw new Error("Access Denied: Incorrect Password");
        }

        const userProfileDiv = document.getElementById('userProfile');
        const userPhoto = document.getElementById('userPhoto');
        const userNameSpan = document.getElementById('userName');
        const miniLogoutBtn = document.getElementById('miniLogoutBtn');
        const scoreDisplay = document.getElementById('score');
        const rankList = document.getElementById('rankList');
        const popImage = document.getElementById('popImage');

        let score = 0;
        let currentNickname = "익명";
        let currentUser = null;
        let saveTimeout = null;

        const imgClosed = '닫음.jpg';
        const imgOpen = '열.png';
        const popSound = new Audio('pop.mp3'); 

        // 로그인 상태 감지 및 데이터 로드
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                userPhoto.src = user.photoURL || "https://via.placeholder.com/36";

                try {
                    const userDocRef = doc(db, "users", user.uid);
                    const userDoc = await getDoc(userDocRef);

                    if (userDoc.exists()) {
                        const data = userDoc.data();
                        score = data.score || 0;
                        currentNickname = data.name || user.displayName || "익명";
                        scoreDisplay.innerText = score;
                    } else {
                        currentNickname = user.displayName || "익명";
                        await setDoc(userDocRef, {
                            name: currentNickname,
                            score: 0,
                            photo: user.photoURL || ""
                        });
                        score = 0;
                        scoreDisplay.innerText = 0;
                    }
                    userNameSpan.innerText = `${currentNickname}님`;
                } catch (e) {
                    console.error("데이터베이스 불러오기 오류:", e);
                }

                loadRanking();
            } else {
                alert("로그인이 필요한 서비스입니다!");
                window.location.href = "index.html"; 
            }
        });

        // 닉네임 변경 기능 (프로필 영역 클릭 시 작동)
        userProfileDiv.addEventListener('click', async (e) => {
            // 로그아웃 버튼을 클릭했을 때는 닉네임 변경창이 뜨지 않도록 예외 처리
            if (e.target === miniLogoutBtn) return;

            const newNickname = prompt("사용할 닉네임을 입력해주세요 (최대 10글자):", currentNickname);
            if (newNickname !== null) {
                const trimmed = newNickname.trim();
                if (trimmed === "") {
                    alert("닉네임은 공백일 수 없습니다.");
                    return;
                }
                if (trimmed.length > 10) {
                    alert("닉네임은 10글자 이하로 입력해주세요.");
                    return;
                }

                currentNickname = trimmed;
                userNameSpan.innerText = `${currentNickname}님`;

                // 파이어베이스에 즉시 반영
                if (currentUser) {
                    const userDocRef = doc(db, "users", currentUser.uid);
                    await setDoc(userDocRef, {
                        name: currentNickname,
                        score: score,
                        photo: currentUser.photoURL || ""
                    }, { merge: true });
                }
                alert(`닉네임이 '${currentNickname}'(으)로 변경되었습니다!`);
            }
        });

        function saveScoreToDB() {
            if (!currentUser) return;
            const userDocRef = doc(db, "users", currentUser.uid);
            setDoc(userDocRef, {
                name: currentNickname,
                score: score,
                photo: currentUser.photoURL || ""
            }, { merge: true }).catch(err => {
                console.error("점수 저장 실패:", err);
            });
        }

        function loadRanking() {
            const q = query(collection(db, "users"), orderBy("score", "desc"), limit(5));
            onSnapshot(q, (snapshot) => {
                rankList.innerHTML = "";
                let rank = 1;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${rank}. ${data.name}</span> <strong>${data.score}점</strong>`;
                    rankList.appendChild(li);
                    rank++;
                });
            }, (error) => {
                console.error("랭킹 불러오기 실패:", error);
                rankList.innerHTML = "<li>랭킹 로드 실패</li>";
            });
        }

        miniLogoutBtn.addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = "index.html"; 
            });
        });

        // 클릭 이벤트 함수들
        function openMouth(event) {
            if(event) event.preventDefault(); 
            popImage.src = imgOpen; 
            score++; 
            scoreDisplay.innerText = score; 

            popSound.currentTime = 0; 
            popSound.play().catch(e => console.log("오디오 재생 실패:", e)); 

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                saveScoreToDB();
            }, 300);
        }

        function closeMouth(event) {
            if(event) event.preventDefault();
            popImage.src = imgClosed; 
        }

        popImage.addEventListener('mousedown', openMouth); 
        popImage.addEventListener('mouseup', closeMouth); 
        popImage.addEventListener('mouseleave', closeMouth); 

        popImage.addEventListener('touchstart', openMouth, {passive: false}); 
        popImage.addEventListener('touchend', closeMouth);
        popImage.addEventListener('touchcancel', closeMouth);
    </script>
</body>
</html>
